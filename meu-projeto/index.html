<html lang="pt-BR">

    <link rel="icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
        <a href="index.html">Início</a>
        <a href="atividade-3.html">Atividade 3</a>
        <a href="sandbox.html">Sandbox</a>
        <a href="paleta.html">Paleta</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<header>
    <h1>Bem-vindo ao projeto 🚀</h1>
</header>

<main class="container">

    <section class="card">
        <h2>Sobre</h2>
        <p>Projeto web com HTML, CSS e JavaScript.</p>
    </section>

    <section class="card">
        <h2>Acessos</h2>

        <a href="atividade-3.html" class="button">📄 Atividade 3</a>

    </section>

</main>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("tema", document.body.classList.contains("light-mode") ? "claro" : "escuro");
}

window.onload = () => {
    if (localStorage.getItem("tema") === "claro") {
        document.body.classList.add("light-mode");
    }
}
</script>

</body>
</html>
