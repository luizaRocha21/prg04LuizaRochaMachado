    <link rel="icon" href="assets/img/favicon.ico">

</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
        <a href="index.html">Início</a>
        <a href="atividade-3.html">Atividade 3</a>
        <a href="sandbox.html">Sandbox</a>
        <a href="paleta.html">Paleta</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<header>
    <h1>Atividade 3 📄</h1>
</header>

<main class="container">

    <section>
        <article class="card">
            <h2>Objetivos</h2>
            <ul>
                <li>Aprender HTML</li>
                <li>Organizar projetos</li>
                <li>Criar páginas web</li>
            </ul>
        </article>

        <article class="card">
            <h2>Imagem dinâmica</h2>
            <img src="https://picsum.photos/400" style="width:100%; border-radius:10px;">
        </article>
    </section>

</main>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("tema", document.body.classList.contains("light-mode") ? "claro" : "escuro");
}

window.onload = () => {
    if (localStorage.getItem("tema") === "claro") {
        document.body.classList.add("light-mode");
    }
}
</script>

</body>
</html>
