<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox 🎧</title>

    <link rel="icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
        <a href="index.html">Início</a>
        <a href="atividade-3.html">Atividade 3</a>
        <a href="sandbox.html">Sandbox</a>
        <a href="paleta.html">Paleta</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<header>
    <h1>Sandbox 🎧</h1>
</header>

<main class="container">

    <!-- PLAYER -->
    <section class="card">
        <h2 id="agora">🎵 Tocando agora: Música 1</h2>

        <audio id="player"></audio>

        <div class="player-controls">
            <button onclick="anterior()">⏮️</button>
            <button onclick="playPause()" id="playBtn">▶️</button>
            <button onclick="proxima()">⏭️</button>
        </div>

        <div class="progress-container" onclick="mudarTempo(event)">
            <div class="progress" id="progress"></div>
        </div>

        <div class="tempo">
            <span id="tempoAtual">0:00</span>
            <span id="duracao">0:00</span>
        </div>
    </section>

    <!-- PLAYLIST -->
    <section class="card">
        <h2>📀 Playlist</h2>
        <ul id="playlist">
            <li onclick="tocar(0)" class="active">🎶 Música 1</li>
            <li onclick="tocar(1)">🎶 Música 2</li>
            <li onclick="tocar(2)">🎶 Música 3</li>
        </ul>
    </section>

    <!-- VÍDEO -->
    <section class="card">
        <h2>🎥 Vídeo</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/QK8mJJJvaes" allowfullscreen></iframe>
        </div>
    </section>

</main>

<script>
const musicas = [
    "assets/audio/musica1.mp3",
    "assets/audio/musica2.mp3",
    "assets/audio/musica3.mp3"
];

const nomes = ["Música 1", "Música 2", "Música 3"];

let atual = 0;

const player = document.getElementById("player");
const playBtn = document.getElementById("playBtn");
const agora = document.getElementById("agora");

function playPause() {
    if (player.paused) {
        player.play();
        playBtn.innerHTML = "⏸️";
    } else {
        player.pause();
        playBtn.innerHTML = "▶️";
    }
}

function tocar(index) {
    atual = index;
    player.src = musicas[index];
    player.play();
    playBtn.innerHTML = "⏸️";

    agora.innerHTML = "🎵 Tocando agora: " + nomes[index];
    atualizarAtivo();
}

function proxima() {
    atual = (atual + 1) % musicas.length;
    tocar(atual);
}

function anterior() {
    atual = (atual - 1 + musicas.length) % musicas.length;
    tocar(atual);
}

function atualizarAtivo() {
    const itens = document.querySelectorAll("#playlist li");
    itens.forEach(i => i.classList.remove("active"));
    itens[atual].classList.add("active");
}

player.addEventListener("timeupdate", () => {
    const progresso = document.getElementById("progress");
    const percent = (player.currentTime / player.duration) * 100;
    progresso.style.width = percent + "%";

    atualizarTempo();
});

function mudarTempo(e) {
    const largura = e.currentTarget.clientWidth;
    const clique = e.offsetX;
    player.currentTime = (clique / largura) * player.duration;
}

function atualizarTempo() {
    document.getElementById("tempoAtual").textContent = formatar(player.currentTime);
    document.getElementById("duracao").textContent = formatar(player.duration);
}

function formatar(seg) {
    if (isNaN(seg)) return "0:00";
    const min = Math.floor(seg / 60);
    const sec = Math.floor(seg % 60).toString().padStart(2, "0");
    return min + ":" + sec;
}

player.addEventListener("ended", proxima);

/* MENU */
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

/* TEMA */
function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("tema", document.body.classList.contains("light-mode") ? "claro" : "escuro");
}

window.onload = () => {
    player.src = musicas[0];

    if (localStorage.getItem("tema") === "claro") {
        document.body.classList.add("light-mode");
    }
}
</script>

</body>
</html>
