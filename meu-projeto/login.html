<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login 🔐</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container mt-5">

<div class="card p-4 mx-auto" style="max-width:400px;">

<h2 class="text-center">Login</h2>

<form onsubmit="return validarLogin()">

<input class="form-control mb-3" type="text" id="email" placeholder="Email">
<input class="form-control mb-3" type="password" id="senha" placeholder="Senha">

<button class="btn btn-primary w-100">Entrar</button>

<p id="erro" class="text-danger mt-2"></p>

</form>

</div>

</div>

<script>
function validarLogin() {
const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const erro = document.getElementById("erro");

if (!email || !senha) {
erro.innerText = "Preencha todos os campos!";
return false;
}

if (!email.includes("@")) {
erro.innerText = "Email inválido!";
return false;
}

window.location.href = "admin.html";
return false;
}

function toggleTheme() {
document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
