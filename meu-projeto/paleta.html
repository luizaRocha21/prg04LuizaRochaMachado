<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta 🎨</title>

    <link rel="icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
        <a href="index.html">Início</a>
        <a href="atividade-3.html">Atividade 3</a>
        <a href="sandbox.html">Sandbox</a>
        <a href="paleta.html">Paleta</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<header>
    <h1>🎨 Paleta de Cores</h1>
</header>

<main class="container">

    <section class="card">
        <h2>Cores</h2>

        <div class="color-box" style="background:#3B9797;">#3B9797</div>
        <div class="color-box" style="background:#16476A;">#16476A</div>
        <div class="color-box" style="background:#132440;">#132440</div>
        <div class="color-box" style="background:#FDB5CE; color:black;">#FDB5CE</div>
    </section>

    <section class="card">
        <h2>Justificativa</h2>
        <p>A paleta combina tecnologia (azul/verde) com leveza (rosa).</p>
    </section>

</main>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("tema", document.body.classList.contains("light-mode") ? "claro" : "escuro");
}

window.onload = () => {
    if (localStorage.getItem("tema") === "claro") {
        document.body.classList.add("light-mode");
    }
}
</script>

</body>
</html>
