<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin 💼</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container mt-5">

<h1>Painel Administrativo</h1>

<table class="table table-striped table-hover mt-4">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Ana</td>
<td>ana@email.com</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editar(this)">Editar</button>
<button class="btn btn-danger btn-sm" onclick="excluir(this)">Excluir</button>
</td>
</tr>

<tr>
<td>2</td>
<td>Bruno</td>
<td>bruno@email.com</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editar(this)">Editar</button>
<button class="btn btn-danger btn-sm" onclick="excluir(this)">Excluir</button>
</td>
</tr>

</tbody>

</table>

</div>

<script>
function excluir(btn) {
if (confirm("Excluir usuário?")) {
btn.closest("tr").remove();
}
}

function editar(btn) {
const linha = btn.closest("tr");

let nome = linha.children[1];
let email = linha.children[2];

const novoNome = prompt("Novo nome:", nome.innerText);
const novoEmail = prompt("Novo email:", email.innerText);

if (novoNome && novoEmail.includes("@")) {
nome.innerText = novoNome;
email.innerText = novoEmail;
}
}

function toggleTheme() {
document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
