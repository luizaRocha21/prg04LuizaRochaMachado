<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin 💼</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- BOTÃO TEMA -->
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<!-- MENU -->
<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
        <a href="index.html">Início</a>
        <a href="login.html">Sair</a>
    </div>
</nav>

<!-- CONTEÚDO -->
<main class="container">

    <h1>Painel Administrativo 💼</h1>

    <table class="tabela">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>1</td>
                <td>Ana</td>
                <td>ana@email.com</td>
                <td>
                    <button class="edit" onclick="editar(this)">Editar</button>
                    <button class="delete" onclick="excluir(this)">Excluir</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Bruno</td>
                <td>bruno@email.com</td>
                <td>
                    <button class="edit" onclick="editar(this)">Editar</button>
                    <button class="delete" onclick="excluir(this)">Excluir</button>
                </td>
            </tr>

        </tbody>

    </table>

</main>

<!-- SCRIPT -->
<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("tema", document.body.classList.contains("light-mode") ? "claro" : "escuro");
}

window.onload = () => {
    if (localStorage.getItem("tema") === "claro") {
        document.body.classList.add("light-mode");
    }
}

/* 🗑️ EXCLUIR */
function excluir(botao) {
    const linha = botao.parentElement.parentElement;

    if (confirm("Deseja excluir este usuário?")) {
        linha.remove();
    }
}

/* ✏️ EDITAR */
function editar(botao) {
    const linha = botao.parentElement.parentElement;

    const nome = linha.children[1];
    const email = linha.children[2];

    const novoNome = prompt("Novo nome:", nome.innerText);
    const novoEmail = prompt("Novo email:", email.innerText);

    if (novoNome && novoEmail) {
        if (!novoEmail.includes("@")) {
            alert("Email inválido!");
            return;
        }

        nome.innerText = novoNome;
        email.innerText = novoEmail;
    }
}
</script>

</body>
</html>
